# =============================================================================
# dbt_project/models/gold/_gold_models.yml
# =============================================================================
# Schema tests for all gold models.
#
# Naming convention: underscore prefix marks this as a config file, not a
# dbt model. Without it, dbt tries to compile schema.yml as SQL (Phase 3
# bug — fixed by this rename).
#
# Syntax: dbt 1.9+ — accepted_values arguments nested under config:
#   - accepted_values:
#       config:
#         values: [a, b, c]
#
# Tests run in ci-dbt-gold.yml (GitHub Actions, --target prod).
# =============================================================================

version: 2

models:

  # ---------------------------------------------------------------------------
  # mart_fantasy_points
  # ---------------------------------------------------------------------------
  - name: mart_fantasy_points
    description: >
      Fantasy points per starter per round per roster.
      Full CDC scoring: captain x1.5 (nearest 0.5), kicker-only stats,
      double-match deduplication (first match only, CDC 6.6).

    columns:

      - name: fantasy_score_id
        description: Surrogate key — hash of (roster_id, round_id, player_id).
        tests:
          - not_null
          - unique

      - name: roster_id
        tests: [not_null]

      - name: round_id
        tests: [not_null]

      - name: player_id
        tests: [not_null]

      - name: is_captain
        tests:
          - not_null
          - accepted_values:
              config:
                values: [true, false]

      - name: is_kicker
        tests:
          - not_null
          - accepted_values:
              config:
                values: [true, false]

      - name: raw_points
        description: Points before captain multiplier.
        tests: [not_null]

      - name: captain_multiplier
        description: 1.5 for captain, 1.0 for all others.
        tests:
          - not_null
          - accepted_values:
              config:
                values: ['1.00', '1.50']

      - name: total_points
        description: >
          Final points after captain multiplier.
          Captain: CEIL(raw_points * 1.5 * 2) / 2.0 — rounds UP to nearest 0.5.
        tests: [not_null]

  # ---------------------------------------------------------------------------
  # mart_roster_scores
  # ---------------------------------------------------------------------------
  - name: mart_roster_scores
    description: >
      Total fantasy points per roster per round.
      Aggregates mart_fantasy_points starters only.

    columns:

      - name: roster_score_id
        description: Surrogate key — hash of (roster_id, round_id).
        tests:
          - not_null
          - unique

      - name: roster_id
        tests: [not_null]

      - name: round_id
        tests: [not_null]

      - name: round_total_points
        description: Sum of total_points for all 15 starters this round.
        tests: [not_null]

      - name: total_starters
        description: Should always be 15 for a complete roster.
        tests: [not_null]

      - name: starters_with_match
        description: Starters who had a match this round (less than 15 means bye week).
        tests: [not_null]

      - name: all_starters_scored
        description: True when every starter had a match this round.
        tests: [not_null]

  # ---------------------------------------------------------------------------
  # mart_leaderboard
  # ---------------------------------------------------------------------------
  - name: mart_leaderboard
    description: >
      League standings. Tiebreaker 1: head-to-head (resolved by frontend).
      Tiebreaker 2: season_total_points DESC (encoded in DENSE_RANK).

    columns:

      - name: leaderboard_id
        description: Surrogate key — hash of (league_id, member_id).
        tests:
          - not_null
          - unique

      - name: league_id
        tests: [not_null]

      - name: member_id
        tests: [not_null]

      - name: wins
        tests: [not_null]

      - name: losses
        tests: [not_null]

      - name: draws
        tests: [not_null]

      - name: season_total_points
        description: Cumulative fantasy points across all rounds.
        tests: [not_null]

      - name: rank
        description: Dense rank within league (1, 2, 2, 3 — no gaps).
        tests: [not_null]

  # ---------------------------------------------------------------------------
  # mart_player_pool
  # ---------------------------------------------------------------------------
  - name: mart_player_pool
    description: >
      Player availability per league.
      pool_status: free | drafted | injured | suspended | doubtful.

    columns:

      - name: player_pool_id
        description: Surrogate key — hash of (league_id, player_id).
        tests:
          - not_null
          - unique

      - name: league_id
        tests: [not_null]

      - name: player_id
        tests: [not_null]

      - name: pool_status
        tests:
          - not_null
          - accepted_values:
              config:
                values: [free, drafted, injured, suspended, doubtful]

      - name: is_drafted
        tests:
          - not_null
          - accepted_values:
              config:
                values: [true, false]

      - name: availability_status
        tests:
          - not_null
          - accepted_values:
              config:
                values: [available, injured, suspended, doubtful]

  # ---------------------------------------------------------------------------
  # mart_player_value
  # ---------------------------------------------------------------------------
  - name: mart_player_value
    description: >
      Default value score per player per competition.
      Used by autodraft (no preference list) and ghost team auto-selection.

    columns:

      - name: player_value_id
        description: Surrogate key — hash of (player_id, competition_id).
        tests:
          - not_null
          - unique

      - name: player_id
        tests: [not_null]

      - name: competition_id
        tests: [not_null]

      - name: default_value_score
        description: Weighted avg + availability bonus + kicker bonus.
        tests: [not_null]

      - name: kicker_score
        description: Kicker-specific score for ghost team kicker selection.
        tests: [not_null]

      - name: availability_status
        tests:
          - not_null
          - accepted_values:
              config:
                values: [available, injured, suspended, doubtful]