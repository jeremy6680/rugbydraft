# =============================================================================
# profiles.yml.example — RugbyDraft dbt connection profiles
# =============================================================================
#
# USAGE:
#   1. Copy this file to profiles.yml (same folder):
#        cp profiles.yml.example profiles.yml
#   2. Fill in the SUPABASE_* values in your .env file (see .env.example).
#   3. Never commit profiles.yml — it is gitignored.
#
# TWO TARGETS (D-030):
#
#   ci   → DuckDB (local file). Used for local dev and GitHub Actions CI.
#           Runs bronze + silver only. No Supabase connection needed.
#           Default target.
#
#   prod → PostgreSQL (Supabase). Used by Airflow in production.
#           Runs bronze + silver + gold.
#           Requires SUPABASE_DB_* env vars to be set.
#
# HOW TO FIND YOUR SUPABASE CREDENTIALS:
#   Supabase dashboard → your project → Settings → Database
#   → "Connection string" section → "Direct connection" tab (not the pooler)
#   Host looks like: db.abcdefghijklmnop.supabase.co
#   User is always: postgres
#   Password: the one you set when creating the project
#
# =============================================================================

rugbydraft:

  # Default target. Used when you run `dbt run` without --target.
  # Keep this as 'ci' — it avoids accidental writes to production.
  target: ci

  outputs:

    # -------------------------------------------------------------------------
    # ci — DuckDB (local dev + GitHub Actions CI)
    # -------------------------------------------------------------------------
    ci:
      type: duckdb
      # Local DuckDB file. Created automatically on first run.
      # Override with DUCKDB_PATH env var if needed.
      path: "{{ env_var('DUCKDB_PATH', '../data/rugbydraft.duckdb') }}"
      threads: 4

    # -------------------------------------------------------------------------
    # prod — PostgreSQL / Supabase (Airflow production pipeline)
    # -------------------------------------------------------------------------
    prod:
      type: postgres
      host: "{{ env_var('SUPABASE_DB_HOST') }}"       # db.<ref>.supabase.co
      port: 5432
      user: "{{ env_var('SUPABASE_DB_USER') }}"        # postgres
      password: "{{ env_var('SUPABASE_DB_PASSWORD') }}"
      dbname: postgres
      schema: public
      threads: 4
      keepalives_idle: 0   # prevent Supabase from dropping idle connections
      sslmode: require     # SSL mandatory on Supabase
